<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Carrusel 3D | Post-Guerra</title>
  
  <!-- FUENTES FUTURISTAS vía Google Fonts (100% funcional en GitHub Pages) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  
  <style>
    /* ---------------------------------------------
       RESET Y CONFIGURACIÓN GLOBAL (POST-GUERRA)
    --------------------------------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      font-family: 'Orbitron', 'Share Tech Mono', 'Courier New', monospace;
      scroll-behavior: smooth;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---------------------------------------------
       CONTENEDOR PRINCIPAL (GRID + CENTRADO TOTAL)
       → El carrusel queda exactamente en el medio
    --------------------------------------------- */
    .main-app {
      width: 100%;
      max-width: 100vw;
      min-height: 100vh;
      background: #000;
      
      /* GRID: 3 filas → Logo | Carrusel | Bloque inferior */
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
      justify-items: center;
      
      /* Espaciado interior controlado */
      padding: 12px 0 20px 0;
    }

    /* ---------- LOGO (margen inferior = 5px) ---------- */
    .logo-area {
      width: 100%;
      text-align: center;
      margin-bottom: 5px;           /* ← 5px exactos */
    }
    .logo-img {
      display: block;
      margin: 0 auto;
      height: 60px;
      width: auto;
      max-width: 85vw;
      object-fit: contain;
    }

    /* ---------- CARRUSEL 3D (PERFECTAMENTE CENTRADO) ---------- */
    .carousel-stage {
      position: relative;
      width: 100%;
      max-width: 100vw;
      height: 0;
      padding-bottom: 52%;          /* Proporción controlada, evita recortes */
      overflow: visible;
      perspective: 1400px;
      touch-action: pan-y pinch-zoom;
      user-select: none;
      margin: 10px 0;
    }

    .carousel-3d {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    /* Tarjeta 3D - SIN RECORTES, SIN DEFORMACIONES */
    .card-3d {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 260px;
      height: 360px;
      margin-left: -130px;
      margin-top: -180px;
      transform-style: preserve-3d;
      border-radius: 24px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
      transition: transform 0.55s cubic-bezier(0.23, 1, 0.32, 1), width 0.4s, height 0.4s, opacity 0.3s;
      will-change: transform;
    }

    .card-3d img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    /* ---------- BLOQUE INFERIOR: BOTÓN + REDES (margen superior 5px) ---------- */
    .bottom-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 5px;              /* ← 5px exactos arriba del botón */
    }

    /* Botón WhatsApp (futurista) */
    .wa-button {
      display: inline-block;
      width: fit-content;
      min-width: 210px;
      padding: 12px 28px;
      background: #ffffff;
      color: #000000;
      text-decoration: none;
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 60px;
      text-align: center;
      transition: all 0.2s ease;
      box-shadow: 0 5px 18px rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(2px);
      margin-bottom: 18px;
    }

    .wa-button:active {
      transform: scale(0.96);
      background: #e0e0e0;
    }

    /* Redes sociales (íconos sólidos blancos) */
    .social-grid {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .social-icon {
      display: inline-flex;
      width: 44px;
      height: 44px;
      transition: transform 0.2s, opacity 0.2s;
      opacity: 0.85;
    }

    .social-icon:hover {
      transform: scale(1.08);
      opacity: 1;
    }

    .social-icon svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    /* ---------- RESPONSIVE: AJUSTE DE TARJETAS Y MÁRGENES ---------- */
    @media (max-width: 520px) {
      .card-3d {
        width: 220px;
        height: 310px;
        margin-left: -110px;
        margin-top: -155px;
      }
      .logo-img {
        height: 50px;
      }
      .social-grid {
        gap: 24px;
      }
      .social-icon {
        width: 38px;
        height: 38px;
      }
      .wa-button {
        font-size: 0.85rem;
        padding: 10px 22px;
        min-width: 180px;
      }
    }

    @media (max-width: 420px) {
      .card-3d {
        width: 190px;
        height: 270px;
        margin-left: -95px;
        margin-top: -135px;
      }
      .carousel-stage {
        padding-bottom: 48%;
      }
      .social-grid {
        gap: 20px;
      }
      .social-icon {
        width: 34px;
        height: 34px;
      }
    }
  </style>
</head>

<script>
  // ------------------------------------------------------------------
  // CARRUSEL 3D – SIN RECORTES, CENTRADO Y SUAVE
  // ------------------------------------------------------------------
  (function() {
    const cards = Array.from(document.querySelectorAll('.card-3d'));
    const total = cards.length;
    const container = document.getElementById('heroCarousel');

    let active = 0;
    let dragStart = false;
    let startClientX = 0;
    let dragDiff = 0;

    function setTransform() {
      const screenW = window.innerWidth;
      
      let centerW, centerH, sideW, sideH, offsetY, posX1, posX2, scale1, scale2, rotDeg1, rotDeg2;
      
      if (screenW <= 400) {
        centerW = 184; centerH = 262;
        sideW = 158; sideH = 236;
        offsetY = 4;
        posX1 = 104; posX2 = 192;
        scale1 = 0.85; scale2 = 0.78;
        rotDeg1 = 18; rotDeg2 = 27;
      } 
      else if (screenW <= 480) {
        centerW = 210; centerH = 298;
        sideW = 180; sideH = 268;
        offsetY = 5;
        posX1 = 118; posX2 = 218;
        scale1 = 0.86; scale2 = 0.79;
        rotDeg1 = 20; rotDeg2 = 29;
      }
      else {
        centerW = 250; centerH = 350;
        sideW = 214; sideH = 314;
        offsetY = 6;
        posX1 = 140; posX2 = 260;
        scale1 = 0.88; scale2 = 0.81;
        rotDeg1 = 22; rotDeg2 = 31;
      }

      cards.forEach((card, idx) => {
        let diff = idx - active;
        let distance = ((diff % total) + total) % total;
        if (distance > total / 2) distance -= total;

        let x = 0, y = 0, s = 1, ry = 0, opacity = 1, zIndex = 3, w = centerW, h = centerH;

        if (distance === 0) {
          x = 0; y = 0; s = 1; ry = 0; zIndex = 8; w = centerW; h = centerH;
        } 
        else if (distance === -1 || distance === 1) {
          const isLeft = distance === -1;
          x = isLeft ? -posX1 : posX1;
          y = offsetY;
          s = scale1;
          ry = isLeft ? rotDeg1 : -rotDeg1;
          zIndex = 4;
          w = sideW; h = sideH;
        } 
        else if (distance === -2 || distance === 2) {
          const isLeft = distance === -2;
          x = isLeft ? -posX2 : posX2;
          y = offsetY + 4;
          s = scale2;
          ry = isLeft ? rotDeg2 : -rotDeg2;
          zIndex = 2;
          w = Math.floor(sideW * 0.93); 
          h = Math.floor(sideH * 0.93);
        } 
        else {
          opacity = 0;
          zIndex = 0;
          s = 0.5;
        }

        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.opacity = opacity;
        card.style.zIndex = zIndex;
        card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${s})`;
      });
    }

    function nextSlide() { active = (active + 1) % total; setTransform(); }
    function prevSlide() { active = (active - 1 + total) % total; setTransform(); }

    container.addEventListener('pointerdown', (e) => {
      dragStart = true;
      startClientX = e.clientX;
      dragDiff = 0;
      container.setPointerCapture?.(e.pointerId);
      e.preventDefault();
    });

    container.addEventListener('pointermove', (e) => {
      if (!dragStart) return;
      dragDiff = e.clientX - startClientX;
    });

    container.addEventListener('pointerup', () => {
      if (!dragStart) return;
      dragStart = false;
      if (Math.abs(dragDiff) > 45) {
        if (dragDiff < 0) nextSlide(); else prevSlide();
      } else {
        setTransform();
      }
      dragDiff = 0;
    });

    container.addEventListener('pointercancel', () => { dragStart = false; setTransform(); });
    container.addEventListener('pointerleave', () => { if (dragStart) { dragStart = false; setTransform(); } });

    window.addEventListener('resize', () => setTransform());
    setTransform();
  })();
</script>
