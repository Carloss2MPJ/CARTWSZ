<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Carrusel 3D - Centrado Perfecto</title>
  <!-- Fuentes futuristas desde Google Fonts (funciona en GitHub Pages) -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    /* ---------- RESET TOTAL ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', 'Share Tech Mono', monospace;
    }

    /* Contenedor principal: usa flex para centrar verticalmente el carrusel */
    .app {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;   /* Centra todo el bloque verticalmente */
    }

    /* Logo: margen inferior 5px */
    .logo-wrapper {
      flex-shrink: 0;
      margin-bottom: 5px;        /* ← 5px debajo del logo */
      text-align: center;
    }
    .logo {
      display: block;
      margin: 0 auto;
      height: 60px;
      width: auto;
      max-width: 85vw;
      object-fit: contain;
    }

    /* Carrusel: ocupa el espacio central y se centra a sí mismo */
    .carousel-container {
      flex: 1 1 auto;           /* Ocupa todo el espacio restante */
      display: flex;
      align-items: center;       /* Centra el carrusel dentro de este espacio */
      justify-content: center;
      width: 100%;
      overflow: visible;
      perspective: 1200px;
      margin: 10px 0;
    }

    .carousel-3d {
      position: relative;
      width: 100%;
      height: 380px;             /* Altura fija para que el 3D funcione bien */
      max-width: 100%;
      transform-style: preserve-3d;
    }

    .card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 250px;
      height: 350px;
      margin-left: -125px;
      margin-top: -175px;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.2);
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), width 0.4s, height 0.4s, opacity 0.3s;
      transform-style: preserve-3d;
    }
    .card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    /* Bloque inferior: botón + redes, con margen superior 5px */
    .bottom {
      flex-shrink: 0;
      margin-top: 5px;           /* ← 5px encima del botón */
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding-bottom: 15px;
    }

    /* Botón WhatsApp futurista */
    .wa-btn {
      display: inline-block;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 2px;
      padding: 12px 28px;
      border-radius: 60px;
      text-transform: uppercase;
      transition: 0.2s;
      box-shadow: 0 5px 20px rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .wa-btn:active { transform: scale(0.96); background: #ddd; }

    /* Redes sociales */
    .social-links {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: center;
    }
    .social-icon {
      width: 38px;
      height: 38px;
      transition: transform 0.2s;
      opacity: 0.9;
    }
    .social-icon:hover { transform: scale(1.08); opacity: 1; }
    .social-icon svg { width: 100%; height: 100%; fill: white; }

    /* Responsive: ajusta tamaño de tarjetas en pantallas pequeñas */
    @media (max-width: 550px) {
      .carousel-3d { height: 320px; }
      .card { width: 210px; height: 300px; margin-left: -105px; margin-top: -150px; }
      .logo { height: 50px; }
      .wa-btn { font-size: 0.75rem; padding: 10px 20px; }
      .social-icon { width: 34px; height: 34px; }
      .social-links { gap: 22px; }
    }
    @media (max-width: 420px) {
      .carousel-3d { height: 280px; }
      .card { width: 180px; height: 260px; margin-left: -90px; margin-top: -130px; }
      .logo { height: 42px; }
      .wa-btn { font-size: 0.7rem; padding: 8px 16px; }
      .social-icon { width: 30px; height: 30px; }
      .social-links { gap: 18px; }
    }
  </style>
</head>
<body>

</div>

<script>
  (function(){
    const cards = Array.from(document.querySelectorAll('.card'));
    const total = cards.length;
    const container = document.getElementById('carrusel3d');
    let active = 0;
    let dragging = false;
    let startX = 0;
    let diff = 0;

    function getLayout() {
      const w = window.innerWidth;
      // Tamaños y posiciones dinámicas para que nunca se recorten
      if (w <= 420) {
        return {
          centerW: 180, centerH: 260,
          sideW: 152, sideH: 230,
          offsetY: 4,
          x1: 98, x2: 178,
          scale1: 0.86, scale2: 0.79,
          rot1: 18, rot2: 27
        };
      } else if (w <= 550) {
        return {
          centerW: 210, centerH: 300,
          sideW: 178, sideH: 266,
          offsetY: 5,
          x1: 114, x2: 206,
          scale1: 0.87, scale2: 0.80,
          rot1: 20, rot2: 29
        };
      } else {
        return {
          centerW: 250, centerH: 350,
          sideW: 212, sideH: 312,
          offsetY: 6,
          x1: 136, x2: 250,
          scale1: 0.88, scale2: 0.81,
          rot1: 22, rot2: 31
        };
      }
    }

    function applyLayout() {
      const l = getLayout();
      cards.forEach((card, i) => {
        let d = i - active;
        let dist = ((d % total) + total) % total;
        if (dist > total/2) dist -= total;

        let x = 0, y = 0, s = 1, ry = 0, op = 1, z = 3;
        let w = l.centerW, h = l.centerH;

        if (dist === 0) {
          x = 0; y = 0; s = 1; ry = 0; z = 8;
          w = l.centerW; h = l.centerH;
        } else if (dist === -1 || dist === 1) {
          const left = dist === -1;
          x = left ? -l.x1 : l.x1;
          y = l.offsetY;
          s = l.scale1;
          ry = left ? l.rot1 : -l.rot1;
          z = 4;
          w = l.sideW; h = l.sideH;
        } else if (dist === -2 || dist === 2) {
          const left = dist === -2;
          x = left ? -l.x2 : l.x2;
          y = l.offsetY + 4;
          s = l.scale2;
          ry = left ? l.rot2 : -l.rot2;
          z = 2;
          w = Math.floor(l.sideW * 0.94);
          h = Math.floor(l.sideH * 0.94);
        } else {
          op = 0; z = 0; s = 0.5;
        }

        card.style.width = w + 'px';
        card.style.height = h + 'px';
        card.style.opacity = op;
        card.style.zIndex = z;
        card.style.transform = `translate(-50%, -50%) translateX(${x}px) translateY(${y}px) rotateY(${ry}deg) scale(${s})`;
      });
    }

    function next() { active = (active + 1) % total; applyLayout(); }
    function prev() { active = (active - 1 + total) % total; applyLayout(); }

    container.addEventListener('pointerdown', (e) => {
      dragging = true;
      startX = e.clientX;
      diff = 0;
      container.setPointerCapture?.(e.pointerId);
      e.preventDefault();
    });
    container.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      diff = e.clientX - startX;
    });
    container.addEventListener('pointerup', () => {
      if (!dragging) return;
      dragging = false;
      if (Math.abs(diff) > 40) {
        if (diff < 0) next(); else prev();
      } else {
        applyLayout();
      }
      diff = 0;
    });
    container.addEventListener('pointercancel', () => { dragging = false; applyLayout(); });
    container.addEventListener('pointerleave', () => { if (dragging) { dragging = false; applyLayout(); } });
    window.addEventListener('resize', applyLayout);
    applyLayout();
  })();
</script>
